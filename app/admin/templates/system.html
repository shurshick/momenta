{% extends "base.html" %}
{% block title %}System{% endblock %}
{% block page_title %}System{% endblock %}
{% block content %}
<div class="card">
    <h3 style="margin-bottom:12px;">Actions</h3>
    <form method="post" action="/admin/system/flush-feed" style="display:inline-block;margin-right:8px;">
        <button type="submit" class="btn btn-warning">Flush Today Feed Cache</button>
    </form>
    <form method="post" action="/admin/system/init-bucket" style="display:inline-block;">
        <button type="submit" class="btn btn-primary">Init S3 Bucket</button>
    </form>
</div>
<div class="card">
    <h3 style="margin-bottom:12px;">Environment</h3>
    <table>
        <thead>
            <tr><th>Key</th><th>Value</th></tr>
        </thead>
        <tbody>
            {% for k, v in settings.items() %}
            <tr>
                <td>{{ k }}</td>
                <td class="truncate">{{ v }}</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>
{% endblock %}
