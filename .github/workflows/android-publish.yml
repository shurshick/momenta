name: Android APK Publish

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: GitHub release tag to attach APK to
        required: true
        type: string

jobs:
  android:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.release_tag }}

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Restore update signing keystore
        env:
          MOMENTA_UPDATE_KEYSTORE_BASE64: ${{ secrets.MOMENTA_UPDATE_KEYSTORE_BASE64 }}
        run: |
          mkdir -p android/keystore
          if [ -z "$MOMENTA_UPDATE_KEYSTORE_BASE64" ]; then
            echo "::error::MOMENTA_UPDATE_KEYSTORE_BASE64 secret is required for update-compatible APK signing"
            exit 1
          fi
          echo "$MOMENTA_UPDATE_KEYSTORE_BASE64" | base64 -d > android/keystore/momenta-update.jks

      - name: Build Prod APK (debug)
        env:
          MOMENTA_UPDATE_STORE_FILE: ../keystore/momenta-update.jks
          MOMENTA_UPDATE_STORE_PASSWORD: android
          MOMENTA_UPDATE_KEY_ALIAS: androiddebugkey
          MOMENTA_UPDATE_KEY_PASSWORD: android
        run: |
          chmod +x gradlew
          set +e
          RC=1
          for i in 1 2 3; do
            echo "=== Attempt $i ==="
            ./gradlew clean assembleProdDebug verifyInstallableProdApk --stacktrace
            RC=$?
            if [ $RC -eq 0 ]; then
              echo "Build succeeded on attempt $i"
              break
            fi
            echo "Attempt $i failed, cleaning and retrying..."
            sleep 10
          done
          set -e
          exit $RC
        working-directory: android

      - name: Verify merged manifest (testOnly check)
        working-directory: android
        run: |
          MANIFEST="app/build/intermediates/merged_manifests/prodDebug/AndroidManifest.xml"
          if [ ! -f "$MANIFEST" ]; then
            echo "::error::Merged manifest not found at $MANIFEST"
            exit 1
          fi
          if grep -q 'android:testOnly="true"' "$MANIFEST"; then
            echo "::error::FAIL: merged manifest contains android:testOnly=true"
            grep 'android:testOnly' "$MANIFEST"
            exit 1
          fi
          echo "OK: no android:testOnly=true found in merged manifest"

      - name: Upload APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-prod-debug
          path: android/app/build/outputs/apk/prod/debug/*.apk
          retention-days: 30

      - name: Upload APK to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ inputs.release_tag }}" \
            android/app/build/outputs/apk/prod/debug/*.apk \
            --repo "${{ github.repository }}" \
            --clobber
