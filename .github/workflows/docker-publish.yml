name: Build and Publish

on:
  release:
    types: [published]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  docker:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,format=short
            type=raw,value=latest

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Make package public
        env:
          GH_TOKEN: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}
        run: |
          gh api --method PATCH /users/shurshick/packages/container/momenta \
            -f visibility="public" \
            --jq '.visibility' 2>/dev/null || \
          echo "::warning::Could not auto-set package visibility. Set it manually at:"
          echo "::warning::https://github.com/users/shurshick/packages/container/momenta/settings"

  android:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Generate keystore for signing
        run: |
          mkdir -p android/keystore
          keytool -genkeypair -v \
            -keystore android/keystore/momenta.jks \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -alias momenta \
            -storepass momenta123 -keypass momenta123 \
            -dname "CN=Momenta, OU=Dev, O=Bghitech, L=Unknown, ST=Unknown, C=RU"

      - name: Build Dev APK (debug)
        run: |
          chmod +x gradlew
          set +e
          RC=1
          for i in 1 2 3; do
            echo "=== Attempt $i ==="
            ./gradlew clean assembleDevDebug --stacktrace
            RC=$?
            if [ $RC -eq 0 ]; then
              echo "Build succeeded on attempt $i"
              break
            fi
            echo "Attempt $i failed, cleaning and retrying..."
            sleep 10
          done
          set -e
          exit $RC
        working-directory: android

      - name: Verify merged manifest (testOnly check)
        working-directory: android
        run: |
          MANIFEST="app/build/intermediates/merged_manifests/devDebug/AndroidManifest.xml"
          if [ ! -f "$MANIFEST" ]; then
            echo "::error::Merged manifest not found at $MANIFEST"
            exit 1
          fi
          echo "=== Merged manifest contents ==="
          cat "$MANIFEST"
          echo ""
          echo "=== Checking for testOnly=true ==="
          if grep -q 'android:testOnly="true"' "$MANIFEST"; then
            echo "::error::FAIL: merged manifest contains android:testOnly=true — APK will not install via Package Installer"
            grep 'android:testOnly' "$MANIFEST"
            exit 1
          fi
          echo "OK: no android:testOnly=true found in merged manifest"

      - name: Verify APK (testOnly check)
        working-directory: android
        run: |
          APK=$(find app/build/outputs/apk -name '*.apk' | head -1)
          if [ -z "$APK" ]; then
            echo "::error::No APK found"
            exit 1
          fi
          echo "APK: $APK"
          echo "=== aapt dump badging (testOnly) ==="
          aapt dump badging "$APK" 2>&1 | grep -i testonly || echo "(no testOnly found — OK)"
          echo ""
          echo "=== aapt dump xmltree (testOnly) ==="
          aapt dump xmltree "$APK" AndroidManifest.xml 2>&1 | grep -i testonly || echo "(no testOnly found — OK)"

      - name: Upload APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-dev-debug
          path: android/app/build/outputs/apk/dev/debug/*.apk
          retention-days: 30

      - name: Upload APK to release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: android/app/build/outputs/apk/dev/debug/*.apk
