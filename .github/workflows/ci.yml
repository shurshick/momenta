name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

jobs:
  backend:
    name: Backend tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          cache-dependency-glob: pyproject.toml

      - name: Check mojibake
        run: python scripts/check_mojibake.py

      - name: Check Alembic heads
        run: >
          uv run --python 3.12 --extra dev python -c
          "from alembic.config import Config;
          from alembic.script import ScriptDirectory;
          heads = ScriptDirectory.from_config(Config('alembic.ini')).get_heads();
          assert len(heads) == 1, heads;
          print(heads[0])"

      - name: Run pytest
        run: uv run --python 3.12 --extra dev pytest -q

  android:
    name: Android build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: temurin

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Build dev debug APK
        working-directory: android
        run: |
          chmod +x gradlew
          ./gradlew assembleDevDebug

      - name: Build prod debug APK
        working-directory: android
        run: ./gradlew assembleProdDebug verifyInstallableProdApk
