services:
  momenta-api:
    image: ghcr.io/shurshick/momenta:v0.2.75
    container_name: momenta-api
    pull_policy: always
    restart: unless-stopped
    depends_on:
      momenta-postgres:
        condition: service_healthy
      momenta-redis:
        condition: service_healthy
      momenta-minio:
        condition: service_healthy
    environment:
      APP_NAME: Momenta
      APP_ENV: production

      APP_TIMEZONE: Europe/Moscow
      API_HOST: 0.0.0.0
      API_PORT: 8000
      PUBLIC_BASE_URL: https://momenta.example.com
      DATABASE_URL: postgresql+psycopg://momenta:CHANGE_ME_DB_PASSWORD@momenta-postgres:5432/momenta
      REDIS_URL: redis://momenta-redis:6379/0
      JWT_SECRET: CHANGE_ME_JWT_SECRET
      JWT_ACCESS_TTL_MINUTES: 30
      JWT_REFRESH_TTL_DAYS: 30
      CORS_ORIGINS: https://momenta.example.com
      S3_ENDPOINT: http://momenta-minio:9000
      S3_PUBLIC_ENDPOINT: https://momenta-media.example.com
      S3_ACCESS_KEY: CHANGE_ME_MINIO_ACCESS
      S3_SECRET_KEY: CHANGE_ME_MINIO_SECRET
      S3_BUCKET: momenta-media
      S3_REGION: us-east-1
      S3_SECURE: "false"
      MEDIA_MAX_IMAGE_MB: 15
      MEDIA_MAX_VIDEO_MB: 80
      RATE_LIMIT_LOGIN_PER_MINUTE: 10
      RATE_LIMIT_UPLOAD_PER_HOUR: 20
      WORKER_MEDIA_MAX_ATTEMPTS: 3
      ADMIN_EMAIL: admin@example.com
      ADMIN_PASSWORD: CHANGE_ME_ADMIN_PASSWORD

      APP_LATEST_ANDROID_APP_NAME: Момент
      APP_LATEST_ANDROID_PACKAGE_NAME: com.bghitech.momenta
      APP_LATEST_ANDROID_CHANNEL: stable
      APP_MIN_SUPPORTED_ANDROID_VERSION_CODE: 1
      APP_LATEST_ANDROID_MANDATORY: "false"
      APP_UPDATE_SOURCE: github
      APP_UPDATE_GITHUB_REPO: shurshick/momenta
      APP_UPDATE_METADATA_ASSET_NAME: android-update.json
      APP_UPDATE_CACHE_TTL_SECONDS: 300
    ports:
      - "8010:8000"
    volumes:
      - /mnt/pool/app/momenta/api:/app/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 5

  momenta-worker:
    image: ghcr.io/shurshick/momenta:v0.2.75
    container_name: momenta-worker
    pull_policy: always
    restart: unless-stopped
    command:
      - python
      - -c
      - "import logging; logging.basicConfig(level=logging.INFO, format='%(asctime)s %(levelname)s [%(name)s] %(message)s', force=True); from app.worker.tasks import run_worker; run_worker()"
    depends_on:
      momenta-api:
        condition: service_healthy
    environment:
      APP_NAME: Momenta
      APP_ENV: production
      DATABASE_URL: postgresql+psycopg://momenta:CHANGE_ME_DB_PASSWORD@momenta-postgres:5432/momenta
      REDIS_URL: redis://momenta-redis:6379/0
      S3_ENDPOINT: http://momenta-minio:9000
      S3_PUBLIC_ENDPOINT: https://momenta-media.example.com
      S3_ACCESS_KEY: CHANGE_ME_MINIO_ACCESS
      S3_SECRET_KEY: CHANGE_ME_MINIO_SECRET
      S3_BUCKET: momenta-media
      S3_REGION: us-east-1
      S3_SECURE: "false"
      WORKER_MEDIA_MAX_ATTEMPTS: 3
    volumes:
      - /mnt/pool/app/momenta/api:/app/data
    healthcheck:
      test: ["CMD", "python", "-m", "app.worker.healthcheck"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  momenta-postgres:
    image: postgres:16-alpine
    container_name: momenta-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: momenta
      POSTGRES_USER: momenta
      POSTGRES_PASSWORD: CHANGE_ME_DB_PASSWORD
    volumes:
      - /mnt/pool/app/momenta/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U momenta -d momenta"]
      interval: 30s
      timeout: 10s
      retries: 5

  momenta-redis:
    image: redis:7-alpine
    container_name: momenta-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - /mnt/pool/app/momenta/redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5

  momenta-minio:
    image: minio/minio:latest
    container_name: momenta-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: CHANGE_ME_MINIO_ACCESS
      MINIO_ROOT_PASSWORD: CHANGE_ME_MINIO_SECRET
    ports:
      - "9010:9000"
      - "9011:9001"
    volumes:
      - /mnt/pool/app/momenta/minio:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 5
